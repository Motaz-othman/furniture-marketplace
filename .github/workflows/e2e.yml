name: E2E Tests

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: furniture_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/furniture_test
      JWT_SECRET: test-jwt-secret-for-ci
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY_TEST }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET_TEST }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY_TEST }}
      NEXT_PUBLIC_API_URL: http://localhost:3000/api
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            storefront/package-lock.json
            tests/package-lock.json

      # Backend
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run Prisma migrations
        working-directory: backend
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/furniture_test

      - name: Start backend
        working-directory: backend
        run: npm start &
        env:
          PORT: 3000

      - name: Wait for backend
        run: npx wait-on http://localhost:3000/api/health --timeout 30000

      # Storefront
      - name: Install storefront dependencies
        working-directory: storefront
        run: npm ci

      - name: Build storefront
        working-directory: storefront
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000/api

      - name: Start storefront
        working-directory: storefront
        run: npm start -- -p 3001 &

      - name: Wait for storefront
        run: npx wait-on http://localhost:3001 --timeout 60000

      # Playwright
      - name: Install Playwright dependencies
        working-directory: tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tests
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: tests
        run: npm test
        env:
          STOREFRONT_URL: http://localhost:3001
          API_URL: http://localhost:3000/api
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          STRIPE_TEST_CARD: '4242424242424242'
          STRIPE_TEST_EXPIRY: '12/34'
          STRIPE_TEST_CVC: '123'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 14
